<!DOCTYPE html>
<html lang="mn">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clinova — AI healthcare appointments &amp; patient care</title>
  <meta name="description"
        content="Clinova — smart appointments, realtime doctor chat, AI agent, patient and hospital workflows. Book visits, manage care, Clinova Mongolia.">

  <meta name="keywords" content="Clinova, clinic, Mongolia, dentist, appointment, telehealth, AI healthcare">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#2563EB">
  <!-- Vercel / release билдэд tool/* скрипт __GOOGLE_SIGNIN_CLIENT_ID__-ийг $GOOGLE_CLIENT_ID-аар солиж орлуулна. -->
  <meta name="google-signin-client_id" content="__GOOGLE_SIGNIN_CLIENT_ID__">

  <!-- Билдэд tool/render_seo_assets.sh — canonical, og:url автоматаар -->
  <!-- CLINOVA_SEO_INJECT_BEGIN -->
  <link rel="canonical" href="https://clinova-production.vercel.app/" />
  <meta property="og:url" content="https://clinova-production.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Clinova — Smart AI healthcare &amp; appointments" />
  <meta property="og:description" content="Clinova — smart AI healthcare appointments, realtime chat, and patient management." />
  <meta name="twitter:card" content="summary_large_image" />
  <!-- CLINOVA_SEO_INJECT_END -->

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Clinova">
  <meta name="application-name" content="Clinova">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">

  <script>
    window.deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredInstallPrompt = e;
      window.dispatchEvent(new Event('clinova-pwa-install-available'));
    });
    window.addEventListener('appinstalled', function () {
      window.deferredInstallPrompt = null;
      window.dispatchEvent(new Event('clinova-pwa-installed'));
    });
    window.clinovaPromptInstall = async function () {
      if (!window.deferredInstallPrompt) return false;
      window.deferredInstallPrompt.prompt();
      var result = await window.deferredInstallPrompt.userChoice;
      window.deferredInstallPrompt = null;
      return result.outcome === 'accepted';
    };
    window.clinovaIsStandalone = function () {
      return window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.

    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
