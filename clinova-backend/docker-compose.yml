version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: clinova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clinova_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinova"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  clinova_postgres_data:
