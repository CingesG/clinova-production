services:
  - type: web
    name: clinova-backend
    runtime: node
    rootDir: clinova-backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production

# DATABASE_URL болон үлдсэн нууцыг Render Dashboard-д оруулна (.env файлыг commit хийхгүй).
