services:
  - type: web
    name: clinova-backend
    runtime: node
    rootDir: clinova-backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production

# DATABASE_URL болон үлдсэн нууцыг Render Dashboard-д оруулна (.env commit битгий).
# Build нь migrate deploy ашиглана. Шинэ DB дээр: migrate дараа `npm run prisma:seed` нэмж ажиллуулна (хэрэгцээтэй бол).
# Локал demo reset-д л `prisma db push` тохиромжтой.
