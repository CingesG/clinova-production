services:
  - type: web
    name: clinova-backend
    runtime: node
    rootDir: clinova-backend
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production

# DATABASE_URL болон үлдсэн нууцыг Render Dashboard-д оруулна (.env commit битгий).
# Миграци ашиглах бол migrate deploy-д сольно (production-д prisma db push-ийг зөв зохистой ажиллуулаарай).
